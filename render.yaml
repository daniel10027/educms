databases:
  - name: educms-db
    plan: free
    databaseName: educms_db
    user: educms_user
    postgresMajorVersion: 16

services:
  # ===================================================
  # BACKEND — Node/Express API
  # ===================================================
  - type: web
    name: educms-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install
    startCommand: npm run migrate && npm start
    healthCheckPath: /api/health
    disk:
      name: educms-uploads
      mountPath: /opt/render/project/src/backend/uploads
      sizeGB: 1
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_VERSION
        value: v1
      - key: DATABASE_URL
        fromDatabase:
          name: educms-db
          property: connectionString
      - key: DB_SSL
        value: "true"
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_REFRESH_EXPIRE
        value: 30d
      - key: REDIS_ENABLED
        value: "false"
      - key: UPLOAD_DIR
        value: ./uploads
      - key: MAX_FILE_SIZE
        value: "5242880"
      - key: ALLOWED_FILE_TYPES
        value: image/jpeg,image/png,image/gif,image/webp,application/pdf
      - key: EMAIL_ENABLED
        value: "false"
      - key: BCRYPT_ROUNDS
        value: "10"
      - key: RATE_LIMIT_WINDOW_MINUTES
        value: "15"
      - key: RATE_LIMIT_MAX_REQUESTS
        value: "200"
      - key: AUTH_RATE_LIMIT_MAX_REQUESTS
        value: "20"
      - key: FRONTEND_URL
        value: https://educms-frontend.onrender.com
      - key: LOG_LEVEL
        value: info
      - key: DEFAULT_PAGE_SIZE
        value: "10"
      - key: MAX_PAGE_SIZE
        value: "100"

  # ===================================================
  # FRONTEND — React/Vite static site
  # ===================================================
  - type: web
    name: educms-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://educms-backend.onrender.com/api/v1
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
